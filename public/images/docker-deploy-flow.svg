<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <style>
    text { font-family: -apple-system, 'Pretendard', system-ui, sans-serif; }
  </style>

  <!-- 로컬 영역 -->
  <rect x="10" y="30" width="310" height="150" rx="12" fill="none" stroke="#3182f6" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="165" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#3182f6">로컬 (내 PC)</text>

  <!-- AWS 영역 -->
  <rect x="400" y="30" width="310" height="150" rx="12" fill="none" stroke="#FF9800" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="555" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#FF9800">AWS</text>

  <!-- 소스 코드 -->
  <rect x="25" y="55" width="120" height="50" rx="8" fill="#f2f4f6" stroke="#e5e8eb" stroke-width="1.5"/>
  <text x="85" y="77" text-anchor="middle" font-size="12" font-weight="700" fill="#191f28">소스 코드</text>
  <text x="85" y="94" text-anchor="middle" font-size="10" fill="#8b95a1">Spring Boot</text>

  <!-- 화살표 소스→이미지 -->
  <line x1="145" y1="80" x2="170" y2="80" stroke="#8b95a1" stroke-width="1.5"/>
  <polygon points="170,75 180,80 170,85" fill="#8b95a1"/>
  <text x="158" y="71" text-anchor="middle" font-size="8" fill="#8b95a1">build</text>

  <!-- Docker 이미지 -->
  <rect x="185" y="55" width="120" height="50" rx="8" fill="#EBF4FF" stroke="#3182f6" stroke-width="1.5"/>
  <text x="245" y="77" text-anchor="middle" font-size="12" font-weight="700" fill="#191f28">Docker 이미지</text>
  <text x="245" y="94" text-anchor="middle" font-size="10" fill="#3182f6">docker build</text>

  <!-- 화살표 이미지→ECR -->
  <line x1="305" y1="80" x2="415" y2="80" stroke="#4CAF50" stroke-width="2"/>
  <polygon points="415,74 428,80 415,86" fill="#4CAF50"/>
  <text x="360" y="71" text-anchor="middle" font-size="10" font-weight="600" fill="#4CAF50">docker push</text>

  <!-- ECR -->
  <rect x="435" y="55" width="120" height="50" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="495" y="77" text-anchor="middle" font-size="12" font-weight="700" fill="#191f28">ECR</text>
  <text x="495" y="94" text-anchor="middle" font-size="10" fill="#4CAF50">이미지 저장소</text>

  <!-- 화살표 ECR→ECS -->
  <line x1="555" y1="80" x2="575" y2="80" stroke="#8b95a1" stroke-width="1.5"/>
  <polygon points="575,75 585,80 575,85" fill="#8b95a1"/>
  <text x="565" y="71" text-anchor="middle" font-size="8" fill="#8b95a1">pull</text>

  <!-- ECS -->
  <rect x="590" y="55" width="110" height="50" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="645" y="77" text-anchor="middle" font-size="12" font-weight="700" fill="#191f28">ECS</text>
  <text x="645" y="94" text-anchor="middle" font-size="10" fill="#FF9800">컨테이너 실행</text>

  <!-- 하단 명령어 순서 -->
  <text x="85" y="140" text-anchor="middle" font-size="10" fill="#4e5968">./gradlew bootJar</text>
  <text x="245" y="140" text-anchor="middle" font-size="10" fill="#4e5968">docker build -t .</text>
  <text x="495" y="140" text-anchor="middle" font-size="10" fill="#4e5968">docker push</text>
  <text x="645" y="140" text-anchor="middle" font-size="10" fill="#4e5968">ecs update-service</text>

  <!-- 순서 번호 -->
  <circle cx="85" cy="158" r="10" fill="#3182f6"/>
  <text x="85" y="162" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">1</text>

  <circle cx="245" cy="158" r="10" fill="#3182f6"/>
  <text x="245" y="162" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">2</text>

  <circle cx="495" cy="158" r="10" fill="#4CAF50"/>
  <text x="495" y="162" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">3</text>

  <circle cx="645" cy="158" r="10" fill="#FF9800"/>
  <text x="645" y="162" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">4</text>
</svg>
