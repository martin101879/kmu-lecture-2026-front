<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" fill="none">
  <style>
    text { font-family: -apple-system, 'Pretendard', system-ui, sans-serif; }
  </style>

  <!-- App -->
  <rect x="280" y="10" width="140" height="50" rx="10" fill="#EBF4FF" stroke="#3182f6" stroke-width="1.5"/>
  <text x="350" y="41" text-anchor="middle" font-size="15" font-weight="700" fill="#191f28">App</text>

  <!-- Lines from App -->
  <line x1="310" y1="60" x2="150" y2="95" stroke="#8b95a1" stroke-width="1.5"/>
  <line x1="350" y1="60" x2="350" y2="95" stroke="#8b95a1" stroke-width="1.5"/>
  <line x1="390" y1="60" x2="550" y2="95" stroke="#8b95a1" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="80" y="95" width="140" height="50" rx="10" fill="#f2f4f6" stroke="#e5e8eb" stroke-width="1.5"/>
  <text x="150" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#191f28">Header</text>

  <!-- GameList -->
  <rect x="280" y="95" width="140" height="50" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="350" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#191f28">GameList</text>

  <!-- GameForm -->
  <rect x="480" y="95" width="140" height="50" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="550" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#191f28">GameForm</text>

  <!-- Line from GameList to GameCard -->
  <line x1="350" y1="145" x2="350" y2="180" stroke="#8b95a1" stroke-width="1.5"/>

  <!-- GameCard -->
  <rect x="255" y="180" width="190" height="50" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="350" y="205" text-anchor="middle" font-size="14" font-weight="600" fill="#191f28">GameCard</text>
  <text x="350" y="222" text-anchor="middle" font-size="10" fill="#8b95a1">(게임 수만큼 반복)</text>

  <!-- Lines from GameCard -->
  <line x1="300" y1="230" x2="170" y2="270" stroke="#8b95a1" stroke-width="1.5"/>
  <line x1="350" y1="230" x2="350" y2="270" stroke="#8b95a1" stroke-width="1.5"/>
  <line x1="400" y1="230" x2="530" y2="270" stroke="#8b95a1" stroke-width="1.5"/>

  <!-- OptionButton A -->
  <rect x="80" y="270" width="140" height="50" rx="10" fill="#EBF4FF" stroke="#3182f6" stroke-width="1.5"/>
  <text x="150" y="295" text-anchor="middle" font-size="13" font-weight="600" fill="#3182f6">OptionButton</text>
  <text x="150" y="312" text-anchor="middle" font-size="10" fill="#8b95a1">선택지 A</text>

  <!-- ResultBar -->
  <rect x="280" y="270" width="140" height="50" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="350" y="301" text-anchor="middle" font-size="13" font-weight="600" fill="#191f28">ResultBar</text>

  <!-- OptionButton B -->
  <rect x="480" y="270" width="140" height="50" rx="10" fill="#FFF0F0" stroke="#f04452" stroke-width="1.5"/>
  <text x="550" y="295" text-anchor="middle" font-size="13" font-weight="600" fill="#f04452">OptionButton</text>
  <text x="550" y="312" text-anchor="middle" font-size="10" fill="#8b95a1">선택지 B</text>

  <!-- Props arrow (left side) -->
  <line x1="30" y1="60" x2="30" y2="310" stroke="#3182f6" stroke-width="2" stroke-dasharray="6 3"/>
  <polygon points="25,310 30,320 35,310" fill="#3182f6"/>
  <text x="30" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#3182f6">Props</text>
  <text x="30" y="340" text-anchor="middle" font-size="10" fill="#3182f6">데이터 전달</text>
  <text x="30" y="352" text-anchor="middle" font-size="10" fill="#3182f6">(부모 → 자식)</text>

  <!-- Events arrow (right side) -->
  <line x1="670" y1="310" x2="670" y2="60" stroke="#f04452" stroke-width="2" stroke-dasharray="6 3"/>
  <polygon points="665,60 670,50 675,60" fill="#f04452"/>
  <text x="670" y="340" text-anchor="middle" font-size="11" font-weight="600" fill="#f04452">Events</text>
  <text x="670" y="50" text-anchor="middle" font-size="10" fill="#f04452">이벤트 전달</text>
  <text x="670" y="38" text-anchor="middle" font-size="10" fill="#f04452">(자식 → 부모)</text>

  <!-- Bottom description -->
  <text x="350" y="395" text-anchor="middle" font-size="12" fill="#8b95a1">컴포넌트 트리: 부모 → 자식으로 Props가 전달되고, 이벤트는 자식 → 부모로 전달</text>
</svg>
