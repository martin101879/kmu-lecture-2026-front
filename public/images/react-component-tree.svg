<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" fill="none">
  <style>
    text { font-family: -apple-system, 'Pretendard', system-ui, sans-serif; }
  </style>

  <!-- State -->
  <rect x="160" y="20" width="180" height="60" rx="12" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="250" y="48" text-anchor="middle" font-size="16" font-weight="700" fill="#191f28">State</text>
  <text x="250" y="68" text-anchor="middle" font-size="11" fill="#4e5968">{ count: 0 }</text>

  <!-- Arrow: State → 화면 -->
  <line x1="250" y1="80" x2="250" y2="110" stroke="#4CAF50" stroke-width="2"/>
  <polygon points="245,110 250,122 255,110" fill="#4CAF50"/>
  <text x="275" y="100" text-anchor="start" font-size="11" fill="#4CAF50">화면 반영</text>

  <!-- 화면 -->
  <rect x="160" y="125" width="180" height="60" rx="12" fill="#EBF4FF" stroke="#3182f6" stroke-width="1.5"/>
  <text x="250" y="148" text-anchor="middle" font-size="15" font-weight="700" fill="#191f28">화면</text>
  <text x="250" y="172" text-anchor="middle" font-size="12" fill="#3182f6">클릭 횟수: 0</text>

  <!-- Arrow: 화면 → 사용자 조작 -->
  <line x1="250" y1="185" x2="250" y2="215" stroke="#f04452" stroke-width="2"/>
  <polygon points="245,215 250,227 255,215" fill="#f04452"/>
  <text x="275" y="205" text-anchor="start" font-size="11" fill="#f04452">사용자 클릭</text>

  <!-- 사용자 조작 -->
  <rect x="160" y="230" width="180" height="50" rx="12" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="250" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#191f28">setState(count + 1)</text>

  <!-- Arrow: 사용자 조작 → State (loop back) -->
  <line x1="160" y1="255" x2="80" y2="255" stroke="#FF9800" stroke-width="2"/>
  <line x1="80" y1="255" x2="80" y2="50" stroke="#FF9800" stroke-width="2"/>
  <line x1="80" y1="50" x2="160" y2="50" stroke="#FF9800" stroke-width="2"/>
  <polygon points="155,45 165,50 155,55" fill="#FF9800"/>
  <text x="60" y="155" text-anchor="middle" font-size="11" font-weight="600" fill="#FF9800" transform="rotate(-90, 60, 155)">State 변경</text>
</svg>
