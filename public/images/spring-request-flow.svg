<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" fill="none">
  <style>
    text { font-family: -apple-system, 'Pretendard', system-ui, sans-serif; }
  </style>

  <!-- Step 1: Browser -->
  <rect x="200" y="10" width="300" height="44" rx="8" fill="#f2f4f6" stroke="#e5e8eb" stroke-width="1.5"/>
  <text x="260" y="37" text-anchor="middle" font-size="12" font-weight="600" fill="#191f28">브라우저</text>
  <text x="460" y="37" text-anchor="end" font-size="11" fill="#8b95a1">GET /api/games</text>

  <!-- Arrow -->
  <line x1="350" y1="54" x2="350" y2="74" stroke="#3182f6" stroke-width="1.5"/>
  <polygon points="345,74 350,84 355,74" fill="#3182f6"/>

  <!-- Step 2: GameController -->
  <rect x="200" y="84" width="300" height="44" rx="8" fill="#EBF4FF" stroke="#3182f6" stroke-width="1.5"/>
  <text x="260" y="111" text-anchor="middle" font-size="12" font-weight="600" fill="#191f28">GameController</text>
  <text x="460" y="111" text-anchor="end" font-size="11" fill="#8b95a1">getGames() 호출</text>

  <!-- Arrow -->
  <line x1="350" y1="128" x2="350" y2="148" stroke="#3182f6" stroke-width="1.5"/>
  <polygon points="345,148 350,158 355,148" fill="#3182f6"/>

  <!-- Step 3: GameService -->
  <rect x="200" y="158" width="300" height="44" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="260" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#191f28">GameService</text>
  <text x="460" y="185" text-anchor="end" font-size="11" fill="#8b95a1">findAll() 비즈니스 로직</text>

  <!-- Arrow -->
  <line x1="350" y1="202" x2="350" y2="222" stroke="#3182f6" stroke-width="1.5"/>
  <polygon points="345,222 350,232 355,222" fill="#3182f6"/>

  <!-- Step 4: GameRepository -->
  <rect x="200" y="232" width="300" height="44" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="260" y="259" text-anchor="middle" font-size="12" font-weight="600" fill="#191f28">GameRepository</text>
  <text x="460" y="259" text-anchor="end" font-size="11" fill="#8b95a1">findAll() DB 조회</text>

  <!-- Arrow -->
  <line x1="350" y1="276" x2="350" y2="296" stroke="#3182f6" stroke-width="1.5"/>
  <polygon points="345,296 350,306 355,296" fill="#3182f6"/>

  <!-- Step 5: Database -->
  <rect x="200" y="306" width="300" height="44" rx="8" fill="#f2f4f6" stroke="#e5e8eb" stroke-width="1.5"/>
  <text x="260" y="333" text-anchor="middle" font-size="12" font-weight="600" fill="#191f28">Database</text>
  <text x="460" y="333" text-anchor="end" font-size="11" fill="#8b95a1">SELECT * FROM game</text>

  <!-- Return Arrow (right side) -->
  <line x1="510" y1="328" x2="530" y2="328" stroke="#f04452" stroke-width="1.5"/>
  <line x1="530" y1="328" x2="530" y2="180" stroke="#f04452" stroke-width="1.5" stroke-dasharray="6 3"/>
  <line x1="530" y1="180" x2="510" y2="180" stroke="#f04452" stroke-width="1.5"/>
  <polygon points="510,175 500,180 510,185" fill="#f04452"/>
  <text x="545" y="260" text-anchor="start" font-size="10" fill="#f04452">응답</text>

  <!-- Step 6: Service DTO -->
  <rect x="200" y="370" width="300" height="44" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="260" y="397" text-anchor="middle" font-size="12" font-weight="600" fill="#191f28">GameService</text>
  <text x="460" y="397" text-anchor="end" font-size="11" fill="#8b95a1">Entity → DTO 변환</text>

  <!-- Arrow down to service -->
  <line x1="350" y1="350" x2="350" y2="370" stroke="#f04452" stroke-width="1.5"/>
  <polygon points="345,370 350,380 355,370" fill="#f04452"/>

  <!-- Arrow -->
  <line x1="350" y1="414" x2="350" y2="434" stroke="#f04452" stroke-width="1.5"/>
  <polygon points="345,434 350,444 355,434" fill="#f04452"/>

  <!-- Step 7: Controller Response -->
  <rect x="200" y="444" width="300" height="44" rx="8" fill="#EBF4FF" stroke="#3182f6" stroke-width="1.5"/>
  <text x="260" y="471" text-anchor="middle" font-size="12" font-weight="600" fill="#191f28">GameController</text>
  <text x="460" y="471" text-anchor="end" font-size="11" fill="#8b95a1">JSON 응답 반환</text>

  <!-- Arrow -->
  <line x1="350" y1="488" x2="350" y2="502" stroke="#f04452" stroke-width="1.5"/>
  <polygon points="345,502 350,512 355,502" fill="#f04452"/>

  <!-- Legend -->
  <line x1="30" y1="490" x2="60" y2="490" stroke="#3182f6" stroke-width="1.5"/>
  <text x="65" y="494" font-size="10" fill="#8b95a1">요청</text>
  <line x1="100" y1="490" x2="130" y2="490" stroke="#f04452" stroke-width="1.5"/>
  <text x="135" y="494" font-size="10" fill="#8b95a1">응답</text>
</svg>
