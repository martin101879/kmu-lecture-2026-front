<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 250" fill="none">
  <style>
    text { font-family: -apple-system, 'Pretendard', system-ui, sans-serif; }
  </style>

  <!-- App (Parent) -->
  <rect x="160" y="15" width="180" height="55" rx="10" fill="#EBF4FF" stroke="#3182f6" stroke-width="1.5"/>
  <text x="250" y="40" text-anchor="middle" font-size="15" font-weight="700" fill="#191f28">App</text>
  <text x="250" y="58" text-anchor="middle" font-size="10" fill="#3182f6">state: { title: "..." }</text>

  <!-- Arrow + Props label -->
  <line x1="190" y1="70" x2="110" y2="105" stroke="#4CAF50" stroke-width="1.5"/>
  <polygon points="110,100 105,112 115,108" fill="#4CAF50"/>
  <text x="140" y="84" text-anchor="middle" font-size="10" fill="#4CAF50">props</text>

  <line x1="250" y1="70" x2="250" y2="105" stroke="#4CAF50" stroke-width="1.5"/>
  <polygon points="245,105 250,117 255,105" fill="#4CAF50"/>
  <text x="268" y="92" text-anchor="start" font-size="10" fill="#4CAF50">props</text>

  <line x1="310" y1="70" x2="390" y2="105" stroke="#4CAF50" stroke-width="1.5"/>
  <polygon points="385,108 395,112 390,100" fill="#4CAF50"/>
  <text x="360" y="84" text-anchor="middle" font-size="10" fill="#4CAF50">props</text>

  <!-- Header -->
  <rect x="30" y="115" width="140" height="45" rx="10" fill="#f2f4f6" stroke="#e5e8eb" stroke-width="1.5"/>
  <text x="100" y="143" text-anchor="middle" font-size="13" font-weight="600" fill="#191f28">Header</text>

  <!-- Content -->
  <rect x="190" y="115" width="140" height="45" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="260" y="143" text-anchor="middle" font-size="13" font-weight="600" fill="#191f28">Content</text>

  <!-- Footer -->
  <rect x="350" y="115" width="140" height="45" rx="10" fill="#f2f4f6" stroke="#e5e8eb" stroke-width="1.5"/>
  <text x="420" y="143" text-anchor="middle" font-size="13" font-weight="600" fill="#191f28">Footer</text>

  <!-- Arrow from Content -->
  <line x1="230" y1="160" x2="180" y2="190" stroke="#4CAF50" stroke-width="1.5"/>
  <polygon points="180,185 174,197 184,193" fill="#4CAF50"/>
  <text x="195" y="177" text-anchor="middle" font-size="10" fill="#4CAF50">props</text>

  <line x1="290" y1="160" x2="340" y2="190" stroke="#4CAF50" stroke-width="1.5"/>
  <polygon points="336,193 346,197 340,185" fill="#4CAF50"/>
  <text x="325" y="177" text-anchor="middle" font-size="10" fill="#4CAF50">props</text>

  <!-- Card 1 -->
  <rect x="100" y="195" width="120" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="160" y="220" text-anchor="middle" font-size="12" font-weight="600" fill="#191f28">Card</text>

  <!-- Card 2 -->
  <rect x="280" y="195" width="120" height="40" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="340" y="220" text-anchor="middle" font-size="12" font-weight="600" fill="#191f28">Card</text>
</svg>
