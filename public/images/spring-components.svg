<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 530" fill="none">
  <style>
    text { font-family: -apple-system, 'Pretendard', system-ui, sans-serif; }
  </style>

  <!-- Client -->
  <rect x="150" y="10" width="300" height="60" rx="10" fill="#f2f4f6" stroke="#e5e8eb" stroke-width="1.5"/>
  <text x="300" y="37" text-anchor="middle" font-size="15" font-weight="700" fill="#191f28">클라이언트 요청</text>
  <text x="300" y="55" text-anchor="middle" font-size="11" fill="#4e5968">브라우저 / 모바일 앱</text>

  <!-- Arrow 1 -->
  <line x1="300" y1="70" x2="300" y2="90" stroke="#8b95a1" stroke-width="1.5"/>
  <polygon points="295,90 300,100 305,90" fill="#8b95a1"/>

  <!-- Spring MVC -->
  <rect x="150" y="100" width="300" height="60" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="300" y="127" text-anchor="middle" font-size="15" font-weight="700" fill="#191f28">Spring MVC</text>
  <text x="300" y="147" text-anchor="middle" font-size="11" fill="#4e5968">DispatcherServlet</text>

  <!-- Arrow 2 -->
  <line x1="300" y1="160" x2="300" y2="180" stroke="#8b95a1" stroke-width="1.5"/>
  <polygon points="295,180 300,190 305,180" fill="#8b95a1"/>

  <!-- Controller -->
  <rect x="150" y="190" width="300" height="60" rx="10" fill="#EBF4FF" stroke="#3182f6" stroke-width="1.5"/>
  <text x="300" y="217" text-anchor="middle" font-size="15" font-weight="700" fill="#191f28">Controller</text>
  <text x="300" y="237" text-anchor="middle" font-size="11" fill="#4e5968">HTTP 요청/응답 처리</text>

  <!-- Arrow 3 -->
  <line x1="300" y1="250" x2="300" y2="270" stroke="#8b95a1" stroke-width="1.5"/>
  <polygon points="295,270 300,280 305,270" fill="#8b95a1"/>

  <!-- Service -->
  <rect x="150" y="280" width="300" height="60" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="300" y="307" text-anchor="middle" font-size="15" font-weight="700" fill="#191f28">Service</text>
  <text x="300" y="327" text-anchor="middle" font-size="11" fill="#4e5968">비즈니스 로직</text>

  <!-- Arrow 4 -->
  <line x1="300" y1="340" x2="300" y2="360" stroke="#8b95a1" stroke-width="1.5"/>
  <polygon points="295,360 300,370 305,360" fill="#8b95a1"/>

  <!-- Repository -->
  <rect x="150" y="370" width="300" height="60" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="300" y="397" text-anchor="middle" font-size="15" font-weight="700" fill="#191f28">Repository</text>
  <text x="300" y="417" text-anchor="middle" font-size="11" fill="#4e5968">데이터 접근</text>

  <!-- Arrow 5 -->
  <line x1="300" y1="430" x2="300" y2="450" stroke="#8b95a1" stroke-width="1.5"/>
  <polygon points="295,450 300,460 305,450" fill="#8b95a1"/>

  <!-- Database -->
  <rect x="150" y="460" width="300" height="60" rx="10" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="300" y="487" text-anchor="middle" font-size="15" font-weight="700" fill="#191f28">Database</text>
  <text x="300" y="507" text-anchor="middle" font-size="11" fill="#4e5968">MySQL</text>
</svg>
