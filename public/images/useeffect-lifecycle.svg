<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" fill="none">
  <style>
    text { font-family: -apple-system, 'Pretendard', system-ui, sans-serif; }
  </style>

  <!-- 제목 -->
  <text x="350" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#191f28">useEffect 실행 흐름</text>

  <!-- 타임라인 -->
  <line x1="50" y1="90" x2="650" y2="90" stroke="#e5e8eb" stroke-width="2"/>

  <!-- Step 1: 컴포넌트 마운트 -->
  <circle cx="120" cy="90" r="8" fill="#3182f6"/>
  <rect x="55" y="40" width="130" height="36" rx="8" fill="#EBF4FF" stroke="#3182f6" stroke-width="1.5"/>
  <text x="120" y="62" text-anchor="middle" font-size="11" font-weight="600" fill="#3182f6">컴포넌트 마운트</text>
  <text x="120" y="115" text-anchor="middle" font-size="10" fill="#4e5968">첫 렌더링</text>

  <!-- Step 2: useEffect 실행 -->
  <circle cx="270" cy="90" r="8" fill="#4CAF50"/>
  <rect x="195" y="40" width="150" height="36" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="270" y="62" text-anchor="middle" font-size="11" font-weight="600" fill="#4CAF50">useEffect 콜백 실행</text>
  <text x="270" y="115" text-anchor="middle" font-size="10" fill="#4e5968">API 호출, 이벤트 등록 등</text>

  <!-- Step 3: State 변경 → 리렌더링 -->
  <circle cx="430" cy="90" r="8" fill="#FF9800"/>
  <rect x="360" y="40" width="140" height="36" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="430" y="62" text-anchor="middle" font-size="11" font-weight="600" fill="#FF9800">State 변경 시</text>
  <text x="430" y="115" text-anchor="middle" font-size="10" fill="#4e5968">리렌더링 발생</text>

  <!-- Step 4: cleanup + 재실행 -->
  <circle cx="580" cy="90" r="8" fill="#9C27B0"/>
  <rect x="505" y="40" width="150" height="36" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="580" y="62" text-anchor="middle" font-size="11" font-weight="600" fill="#9C27B0">언마운트 / 재실행</text>
  <text x="580" y="115" text-anchor="middle" font-size="10" fill="#4e5968">cleanup 함수 실행</text>

  <!-- 의존성 배열 설명 -->
  <rect x="50" y="150" width="195" height="55" rx="8" fill="#EBF4FF" stroke="#3182f6" stroke-width="1"/>
  <text x="147" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#3182f6">[ ] 빈 배열</text>
  <text x="147" y="190" text-anchor="middle" font-size="11" fill="#4e5968">마운트 시 한 번만 실행</text>

  <rect x="255" y="150" width="195" height="55" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="352" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#4CAF50">[value] 의존성 지정</text>
  <text x="352" y="190" text-anchor="middle" font-size="11" fill="#4e5968">value 변경 시마다 실행</text>

  <rect x="460" y="150" width="195" height="55" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="557" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#FF9800">생략</text>
  <text x="557" y="190" text-anchor="middle" font-size="11" fill="#4e5968">매 렌더링마다 실행</text>

  <!-- 하단 주의 -->
  <rect x="120" y="225" width="460" height="40" rx="8" fill="#f2f4f6" stroke="#e5e8eb" stroke-width="1"/>
  <text x="350" y="245" text-anchor="middle" font-size="11" fill="#4e5968">cleanup 함수: 이벤트 리스너 해제, 타이머 정리 등</text>
  <text x="350" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#191f28">컴포넌트가 사라지거나 Effect가 재실행되기 직전에 호출</text>
</svg>
