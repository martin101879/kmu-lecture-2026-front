<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 770 200" fill="none">
  <style>
    text { font-family: -apple-system, 'Pretendard', system-ui, sans-serif; }
  </style>

  <!-- User -->
  <rect x="16" y="44" width="140" height="112" rx="12" fill="#f2f4f6" stroke="#e5e8eb" stroke-width="1.5"/>
  <text x="86" y="78" text-anchor="middle" font-size="20">👤</text>
  <text x="86" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#191f28">사용자</text>
  <text x="86" y="118" text-anchor="middle" font-size="11" fill="#4e5968">브라우저</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="100" x2="190" y2="100" stroke="#8b95a1" stroke-width="1.5" stroke-dasharray="6 3"/>
  <polygon points="190,95 200,100 190,105" fill="#8b95a1"/>

  <!-- Frontend -->
  <rect x="204" y="44" width="140" height="112" rx="12" fill="#EBF4FF" stroke="#3182f6" stroke-width="1.5"/>
  <text x="274" y="78" text-anchor="middle" font-size="20">⚛️</text>
  <text x="274" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#191f28">Frontend</text>
  <text x="274" y="118" text-anchor="middle" font-size="11" fill="#4e5968">React</text>

  <!-- Arrow 2 -->
  <line x1="348" y1="100" x2="398" y2="100" stroke="#8b95a1" stroke-width="1.5" stroke-dasharray="6 3"/>
  <polygon points="398,95 408,100 398,105" fill="#8b95a1"/>
  <text x="378" y="88" text-anchor="middle" font-size="10" fill="#8b95a1">API 호출</text>

  <!-- Backend -->
  <rect x="412" y="44" width="140" height="112" rx="12" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="482" y="78" text-anchor="middle" font-size="20">🍃</text>
  <text x="482" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#191f28">Backend</text>
  <text x="482" y="118" text-anchor="middle" font-size="11" fill="#4e5968">Spring Boot</text>

  <!-- Arrow 3 -->
  <line x1="556" y1="100" x2="606" y2="100" stroke="#8b95a1" stroke-width="1.5" stroke-dasharray="6 3"/>
  <polygon points="606,95 616,100 606,105" fill="#8b95a1"/>
  <text x="586" y="88" text-anchor="middle" font-size="10" fill="#8b95a1">SQL</text>

  <!-- Database -->
  <rect x="620" y="44" width="140" height="112" rx="12" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="690" y="78" text-anchor="middle" font-size="20">🗄️</text>
  <text x="690" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#191f28">DB</text>
  <text x="690" y="118" text-anchor="middle" font-size="11" fill="#4e5968">MySQL</text>

  <!-- Bottom label -->
  <text x="385" y="188" text-anchor="middle" font-size="11" fill="#8b95a1">사용자 요청 → 프론트엔드 → 백엔드 API → 데이터베이스</text>
</svg>
