<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 810 280" fill="none">
  <style>
    text { font-family: -apple-system, 'Pretendard', system-ui, sans-serif; }
  </style>

  <!-- State Change -->
  <rect x="20" y="90" width="130" height="100" rx="10" fill="#FFF3E0" stroke="#FF9800" stroke-width="1.5"/>
  <text x="85" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#191f28">State 변경</text>
  <text x="85" y="148" text-anchor="middle" font-size="11" fill="#4e5968">setCount(5)</text>
  <text x="85" y="166" text-anchor="middle" font-size="11" fill="#4e5968">setState(...)</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="140" x2="195" y2="140" stroke="#8b95a1" stroke-width="1.5"/>
  <polygon points="195,135 205,140 195,145" fill="#8b95a1"/>

  <!-- Virtual DOM -->
  <rect x="210" y="50" width="160" height="180" rx="10" fill="#EBF4FF" stroke="#3182f6" stroke-width="1.5"/>
  <text x="290" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#191f28">가상 DOM</text>
  <text x="290" y="96" text-anchor="middle" font-size="10" fill="#4e5968">(가벼운 JavaScript 객체)</text>

  <!-- Virtual DOM tree -->
  <rect x="240" y="110" width="100" height="28" rx="6" fill="#ffffff" stroke="#3182f6" stroke-width="1"/>
  <text x="290" y="129" text-anchor="middle" font-size="11" fill="#3182f6">div</text>

  <line x1="270" y1="138" x2="255" y2="155" stroke="#3182f6" stroke-width="1"/>
  <line x1="310" y1="138" x2="325" y2="155" stroke="#3182f6" stroke-width="1"/>

  <rect x="230" y="155" width="50" height="24" rx="5" fill="#ffffff" stroke="#3182f6" stroke-width="1"/>
  <text x="255" y="171" text-anchor="middle" font-size="10" fill="#3182f6">h1</text>

  <rect x="300" y="155" width="50" height="24" rx="5" fill="#FF9800" fill-opacity="0.2" stroke="#FF9800" stroke-width="1.5"/>
  <text x="325" y="171" text-anchor="middle" font-size="10" font-weight="600" fill="#FF9800">p: 5</text>

  <text x="290" y="205" text-anchor="middle" font-size="10" fill="#8b95a1">변경된 부분 감지</text>

  <!-- Arrow 2 - Diff -->
  <line x1="370" y1="140" x2="415" y2="140" stroke="#3182f6" stroke-width="1.5"/>
  <polygon points="415,135 425,140 415,145" fill="#3182f6"/>
  <text x="395" y="128" text-anchor="middle" font-size="10" font-weight="600" fill="#3182f6">Diff</text>

  <!-- Real DOM -->
  <rect x="430" y="50" width="160" height="180" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="510" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#191f28">실제 DOM</text>
  <text x="510" y="96" text-anchor="middle" font-size="10" fill="#4e5968">(브라우저 HTMLElement)</text>

  <!-- Real DOM tree -->
  <rect x="460" y="110" width="100" height="28" rx="6" fill="#ffffff" stroke="#4CAF50" stroke-width="1"/>
  <text x="510" y="129" text-anchor="middle" font-size="11" fill="#4CAF50">div</text>

  <line x1="490" y1="138" x2="475" y2="155" stroke="#4CAF50" stroke-width="1"/>
  <line x1="530" y1="138" x2="545" y2="155" stroke="#4CAF50" stroke-width="1"/>

  <rect x="450" y="155" width="50" height="24" rx="5" fill="#ffffff" stroke="#4CAF50" stroke-width="1"/>
  <text x="475" y="171" text-anchor="middle" font-size="10" fill="#4CAF50">h1</text>

  <rect x="520" y="155" width="50" height="24" rx="5" fill="#FF9800" fill-opacity="0.2" stroke="#FF9800" stroke-width="1.5"/>
  <text x="545" y="171" text-anchor="middle" font-size="10" font-weight="600" fill="#FF9800">p: 5</text>

  <text x="510" y="205" text-anchor="middle" font-size="10" fill="#4CAF50">변경된 부분만 업데이트</text>

  <!-- Arrow 3 - Browser -->
  <line x1="590" y1="140" x2="615" y2="140" stroke="#8b95a1" stroke-width="1.5"/>
  <polygon points="615,135 625,140 615,145" fill="#8b95a1"/>

  <!-- Browser -->
  <rect x="630" y="50" width="160" height="180" rx="10" fill="#f2f4f6" stroke="#e5e8eb" stroke-width="1.5"/>
  <text x="710" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#191f28">화면</text>
  <text x="710" y="96" text-anchor="middle" font-size="10" fill="#4e5968">(사용자가 보는 결과)</text>
  <text x="710" y="145" text-anchor="middle" font-size="36">🖥️</text>
  <text x="710" y="195" text-anchor="middle" font-size="11" fill="#8b95a1">변경 사항 즉시 반영</text>

  <!-- Bottom description -->
  <text x="405" y="260" text-anchor="middle" font-size="11" fill="#8b95a1">State 변경 → 가상 DOM 업데이트 → 실제 DOM과 비교(Diff) → 실제 DOM 변경 → 브라우저가 화면 갱신</text>
</svg>
