AWSTemplateFormatVersion: "2010-09-09"
Description: Balance Game Backend Infrastructure (EC2 + Docker + ALB + HTTPS)

# ──────────────────────────────────────────────────────────────
# Parameters - 스택 생성 시 사용자가 입력하는 값
# ──────────────────────────────────────────────────────────────
Parameters:
  DBPassword:
    Type: String
    NoEcho: true # 콘솔에서 입력값을 숨김
    MinLength: 8
    Description: RDS master password

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName # AWS에 등록된 키 페어 목록에서 선택
    Description: EC2 SSH Key Pair

  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id # 콘솔에서 호스팅 영역 드롭다운으로 선택
    Description: Route 53 Hosted Zone ID

  DomainName:
    Type: String
    Description: "API domain (e.g. api.honggildong.cecil1018.click)"

# ──────────────────────────────────────────────────────────────
# Resources - 생성할 AWS 리소스 정의
# 각 리소스의 첫 번째 depth는 논리적 리소스 이름 (Logical ID)
# 템플릿 안에서 !Ref, !GetAtt 등으로 다른 리소스를 참조할 때 사용
# ──────────────────────────────────────────────────────────────
Resources:
  # ============================================
  # VPC & Network
  # ============================================

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16 # VPC IP 대역 (65,536개)
      EnableDnsSupport: true # VPC 내부 DNS 서버 활성화
      EnableDnsHostnames: true # 리소스에 DNS 호스트명 자동 부여

  InternetGateway:
    Type: AWS::EC2::InternetGateway # VPC → 인터넷 출입구

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment # 인터넷 게이트웨이를 VPC에 연결
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24 # 서브넷 IP 대역 (256개)
      AvailabilityZone: !Select [0, !GetAZs ""] # 첫 번째 AZ
      MapPublicIpOnLaunch: true # 공인 IP 자동 할당

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""] # 두 번째 AZ (ALB, RDS는 2개 AZ 필요)
      MapPublicIpOnLaunch: true

  PublicRouteTable:
    Type: AWS::EC2::RouteTable # 네트워크 트래픽 경로 규칙
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0 # 모든 외부 트래픽을
      GatewayId: !Ref InternetGateway # 인터넷 게이트웨이로 전달

  Subnet1RouteTable:
    Type: AWS::EC2::SubnetRouteTableAssociation # 서브넷에 라우트 테이블 연결
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  Subnet2RouteTable:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ============================================
  # Security Groups (가상 방화벽)
  # ============================================

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB - allow HTTPS from internet
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443 # HTTPS
          ToPort: 443
          CidrIp: 0.0.0.0/0 # 모든 IP에서 접근 허용

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: EC2 - allow SSH and traffic from ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22 # SSH 접속
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 8080 # Spring Boot 포트
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup # ALB에서만 접근 허용

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS - VPC internal only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306 # MySQL 포트
          ToPort: 3306
          SourceSecurityGroupId: !Ref EC2SecurityGroup # EC2에서만 접근 허용

  # ============================================
  # EC2 Instance (Docker 설치 포함)
  # ============================================

  EC2Role:
    Type: AWS::IAM::Role # EC2에 부여할 권한
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly # ECR 이미지 pull 권한

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile # EC2에 IAM Role을 연결하기 위한 래퍼
    Properties:
      Roles:
        - !Ref EC2Role

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro # 프리티어 대상
      ImageId:
        !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
        # ↑ SSM Parameter Store에서 최신 Amazon Linux 2023 AMI ID를 자동으로 가져옴
      KeyName: !Ref KeyPairName # SSH 접속용 키 페어
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref EC2SecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData: # EC2 시작 시 자동 실행되는 스크립트
        Fn::Base64: |
          #!/bin/bash
          dnf update -y
          dnf install -y docker
          systemctl start docker
          systemctl enable docker          # 재시작해도 Docker 자동 시작
          usermod -aG docker ec2-user      # ec2-user가 sudo 없이 docker 명령 사용 가능

  # ============================================
  # ACM (SSL 인증서) + Route 53
  # ============================================

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub "${DomainName}" # 인증서를 발급할 도메인
      ValidationMethod: DNS # DNS 레코드로 도메인 소유 검증
      DomainValidationOptions:
        - DomainName: !Sub "${DomainName}"
          HostedZoneId: !Ref HostedZoneId # Route 53에서 검증 레코드 자동 생성

  ApiDNSRecord:
    Type: AWS::Route53::RecordSet # 도메인 → ALB 연결
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Sub "${DomainName}"
      Type: A # A 레코드 (도메인 → IP)
      AliasTarget:
        DNSName: !GetAtt ALB.DNSName
        HostedZoneId: !GetAtt ALB.CanonicalHostedZoneID

  # ============================================
  # ALB (Application Load Balancer)
  # ============================================

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    DependsOn: VPCGatewayAttachment # 인터넷 게이트웨이 연결 후 생성
    Properties:
      Name: balance-api-alb
      Scheme: internet-facing # 외부에서 접근 가능
      Type: application # HTTP/HTTPS용 로드 밸런서
      Subnets: # 최소 2개 AZ의 서브넷 필요
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: balance-api-tg
      VpcId: !Ref VPC
      Protocol: HTTP
      Port: 8080
      TargetType: instance # EC2 인스턴스 기반 타겟
      HealthCheckPath: /api/health # 헬스 체크 경로 (HealthController)
      HealthCheckIntervalSeconds: 30 # 30초마다 헬스 체크
      HealthyThresholdCount: 2 # 2번 연속 성공 → healthy
      UnhealthyThresholdCount: 3 # 3번 연속 실패 → unhealthy
      Targets:
        - Id: !Ref EC2Instance # 이 EC2 인스턴스로 요청 전달
          Port: 8080

  ALBHttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Protocol: HTTPS
      Port: 443
      Certificates:
        - CertificateArn: !Ref Certificate # ACM 인증서 연결
      DefaultActions:
        - Type: forward # Target Group으로 요청 전달
          TargetGroupArn: !Ref TargetGroup

  # ============================================
  # RDS (MySQL)
  # ============================================

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup # RDS가 배치될 서브넷 (최소 2개 AZ)
    Properties:
      DBSubnetGroupDescription: Balance Game DB
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  Database:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: balance-game-db
      Engine: mysql
      EngineVersion: "8.0"
      DBInstanceClass: db.t3.micro # 프리티어 대상
      AllocatedStorage: 20 # 스토리지 20GB
      DBName: balance # 자동 생성할 데이터베이스 이름
      MasterUsername: admin
      MasterUserPassword: !Ref DBPassword # Parameters에서 입력받은 비밀번호
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: true # 외부에서 직접 접근 불가
    DeletionPolicy: Delete # 스택 삭제 시 DB도 삭제

  # ============================================
  # ECR (Elastic Container Registry)
  # ============================================
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: balance-api
      EmptyOnDelete: true # 이미지가 있어도 삭제 허용
    DeletionPolicy: Delete

# ──────────────────────────────────────────────────────────────
# Outputs - 스택 생성 후 확인할 수 있는 결과 값
# ──────────────────────────────────────────────────────────────
Outputs:
  # 백엔드 API URL (HTTPS)
  ApiUrl:
    Value: !Sub "https://${DomainName}"

  # EC2 SSH 접속
  EC2PublicIP:
    Value: !GetAtt EC2Instance.PublicIp
  SSHCommand:
    Value: !Sub "ssh -i ${KeyPairName}.pem ec2-user@${EC2Instance.PublicIp}"

  # Docker 이미지 push 대상
  ECRUri:
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/balance-api"

  # RDS 접속 주소
  RDSEndpoint:
    Value: !GetAtt Database.Endpoint.Address
